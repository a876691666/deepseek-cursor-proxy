services:
  deepseek-cursor-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: deepseek-cursor-proxy:latest
    container_name: deepseek-cursor-proxy
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      # Override these on the docker compose command line or via an .env file.
      TZ: ${TZ:-UTC}
    volumes:
      # Persist the SQLite reasoning cache + config across restarts.
      - deepseek-cursor-proxy-data:/home/app/.deepseek-cursor-proxy
    command:
      - --host
      - 0.0.0.0
      - --port
      - "9000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:9000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  deepseek-cursor-proxy-data:
